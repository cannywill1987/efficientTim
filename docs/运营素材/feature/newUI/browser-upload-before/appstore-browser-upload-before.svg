<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#182033" flood-opacity="0.18"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
      .muted { fill: #6b7280; }
      .text { fill: #1f2937; }
      .line { stroke: #d8dee9; stroke-width: 1; }
      .blue { fill: #0a84ff; }
      .green { fill: #20a464; }
      .orange { fill: #f59e0b; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <g class="ui" filter="url(#shadow)">
    <rect x="80" y="70" width="1440" height="860" rx="18" fill="#ffffff"/>

    <rect x="80" y="70" width="1440" height="64" rx="18" fill="#f2f4f7"/>
    <circle cx="112" cy="102" r="9" fill="#ff5f57"/>
    <circle cx="140" cy="102" r="9" fill="#ffbd2e"/>
    <circle cx="168" cy="102" r="9" fill="#28c840"/>
    <rect x="230" y="88" width="940" height="32" rx="16" fill="#ffffff" stroke="#dde3ea"/>
    <text x="260" y="109" font-size="15" class="muted">appstoreconnect.apple.com/apps/1663772116/distribution/ios/version/inflight</text>
    <circle cx="1450" cy="102" r="18" fill="#f59e0b"/>
    <text x="1444" y="109" font-size="18" font-weight="700" fill="#ffffff">月</text>

    <rect x="80" y="134" width="1440" height="72" fill="#ffffff"/>
    <text x="126" y="179" font-size="23" font-weight="700" class="text"> App Store Connect</text>
    <text x="575" y="179" font-size="18" font-weight="600" class="blue">分发</text>
    <text x="640" y="179" font-size="18" font-weight="600" fill="#3b82f6">分析</text>
    <text x="710" y="179" font-size="18" font-weight="600" fill="#3b82f6">TestFlight</text>

    <line x1="80" y1="206" x2="1520" y2="206" class="line"/>

    <rect x="80" y="207" width="285" height="723" fill="#fbfcfe"/>
    <text x="124" y="262" font-size="17" font-weight="700" class="text">iOS App</text>
    <rect x="116" y="282" width="222" height="34" rx="7" fill="#edf1f7"/>
    <circle cx="140" cy="299" r="7" class="orange"/>
    <text x="154" y="305" font-size="15" class="text">1.0 准备提交</text>
    <text x="124" y="370" font-size="17" font-weight="700" class="text">综合</text>
    <text x="124" y="405" font-size="15" class="muted">App 信息</text>
    <text x="124" y="438" font-size="15" class="muted">App 审核</text>
    <text x="124" y="471" font-size="15" class="muted">历史记录</text>
    <text x="124" y="555" font-size="17" font-weight="700" class="text">App Store</text>
    <text x="124" y="590" font-size="15" class="muted">App 隐私</text>
    <text x="124" y="623" font-size="15" class="muted">App 辅助功能</text>
    <text x="124" y="656" font-size="15" class="muted">评分与评论</text>

    <g transform="translate(405 246)">
      <text x="0" y="0" font-size="31" font-weight="760" class="text">iOS App 版本 1.0</text>
      <rect x="1054" y="-25" width="76" height="34" rx="8" fill="#eef2f7" stroke="#d8dee9"/>
      <text x="1080" y="-3" font-size="15" fill="#a0a7b2">保存</text>
      <rect x="1146" y="-25" width="132" height="34" rx="8" fill="#0a84ff"/>
      <text x="1175" y="-3" font-size="15" font-weight="700" fill="#ffffff">添加以供审核</text>

      <text x="0" y="64" font-size="15" class="muted">以下素材和元数据将在你 App 的产品页面上显示，用户在安装你的 App 时即可查看。</text>
      <rect x="1120" y="43" width="108" height="32" rx="8" fill="#ffffff" stroke="#d8dee9"/>
      <text x="1138" y="64" font-size="14" class="text">简体中文</text>

      <text x="0" y="130" font-size="24" font-weight="760" class="text">预览和截屏</text>
      <text x="0" y="164" font-size="15" class="muted">上传前状态：此本地化版本尚未添加截屏，需要选择文件或拖拽图片到上传区域。</text>

      <text x="0" y="215" font-size="17" font-weight="700" class="blue">iPhone</text>
      <text x="82" y="215" font-size="17" font-weight="700" fill="#64748b">iPad</text>
      <text x="150" y="215" font-size="17" font-weight="700" fill="#64748b">Apple Watch</text>
      <line x1="0" y1="228" x2="58" y2="228" stroke="#0a84ff" stroke-width="3"/>

      <rect x="0" y="252" width="1278" height="305" rx="8" fill="#fbfdff" stroke="#d5dce8" stroke-width="2" stroke-dasharray="8 8"/>
      <g transform="translate(64 292)">
        <rect x="0" y="0" width="76" height="112" rx="14" fill="#ffffff" stroke="#c9d3e2" stroke-width="3"/>
        <rect x="10" y="13" width="56" height="86" rx="8" fill="#f3f6fb"/>
        <circle cx="38" cy="103" r="4" fill="#c9d3e2"/>
        <text x="110" y="44" font-size="17" font-weight="700" class="text">iPhone 6.5 英寸显示屏</text>
        <text x="110" y="76" font-size="14" class="muted">1242 x 2688、2688 x 1242、1284 x 2778 或 2778 x 1284px</text>
      </g>

      <g transform="translate(445 348)">
        <circle cx="112" cy="40" r="39" fill="#eaf2ff"/>
        <path d="M96 37h14V23h24v14h14l-26 27z" fill="#0a84ff"/>
        <rect x="86" y="70" width="52" height="7" rx="3.5" fill="#0a84ff"/>
        <text x="-62" y="132" font-size="20" font-weight="700" class="text">将 App 截屏拖到此处</text>
        <text x="-136" y="166" font-size="15" class="muted">最多 3 个 App 预览和最多 10 张截屏</text>
        <rect x="8" y="192" width="216" height="42" rx="21" fill="#0a84ff"/>
        <text x="72" y="219" font-size="16" font-weight="700" fill="#ffffff">选取文件</text>
      </g>

      <rect x="0" y="575" width="260" height="36" rx="18" fill="#fff7ed"/>
      <text x="22" y="599" font-size="15" font-weight="700" fill="#c2410c">上传前：0/3 个 App 预览｜0/10 张截屏</text>

      <text x="0" y="675" font-size="18" font-weight="700" class="text">推广文本</text>
      <rect x="0" y="692" width="1278" height="82" rx="6" fill="#ffffff" stroke="#d8dee9"/>
      <text x="20" y="723" font-size="15" fill="#a0a7b2">等待填写中文推广文案...</text>

      <text x="0" y="823" font-size="18" font-weight="700" class="text">描述</text>
      <rect x="0" y="840" width="1278" height="90" rx="6" fill="#ffffff" stroke="#d8dee9"/>
      <text x="20" y="871" font-size="15" fill="#a0a7b2">等待填写 App Store 描述...</text>
    </g>
  </g>

  <g class="ui">
    <rect x="1110" y="816" width="410" height="72" rx="16" fill="#111827" opacity="0.92"/>
    <text x="1135" y="846" font-size="18" font-weight="760" fill="#ffffff">浏览器上传前效果图</text>
    <text x="1135" y="872" font-size="14" fill="#d1d5db">用于说明 App Store Connect 截图上传前的空状态</text>
  </g>
</svg>
