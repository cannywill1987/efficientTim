#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;


#gzip on;
#gzip_proxied any;
#gzip_min_length 1k;
#gzip_buffers 4 16k;
#gzip_http_version 1.0;
#gzip_comp_level 5;
#gzip_types text/plain application/javascript application/css text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
#gzip_vary on;
#gzip_disable "MSIE [1-6]\.";


upstream singapore_server { #配置后端服务器组 
    server 8.219.155.23:9999;
}

upstream singapore_server_affine { #配置后端服务器组
    server 8.219.155.23:3000;
}

    server {
        listen       80;
        #server_name  localhost;
                 listen      443 ssl http2;                
                  server_name  usa.timerbell.com;
server_name  test.timerbell.com;
    ssl_certificate   /usr/local/nginx/conf/cert/8707700_www.timerbell.com.pem;
               ssl_certificate_key  /usr/local/nginx/conf/cert/8707700_www.timerbell.com.key;
               ssl_session_timeout 5m;
               ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;#按照这个套件配置

               ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
               ssl_prefer_server_ciphers on;

                rewrite_log   off;

                  server_name  www.timerbell.com;
        #charset koi8-r;

        #access_log  logs/host.access.log  main;

   gzip on;
   gzip_proxied any;
   gzip_min_length 1k;

   gzip_buffers 4 16k;
gzip_http_version 1.0;
gzip_comp_level 9;
gzip_types text/plain application/javascript application/css text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png application/octet-stream application/json application/wasm;
gzip_vary on;
gzip_disable "MSIE [1-6]\.";

        location /.well-known {
default_type application/json;
}

        location /apple-app-site-association {
default_type application/json;
}

 location /home/ {
  proxy_pass https://oss.timerbell.com;
}

location /app/ {
proxy_pass https://oss.timerbell.com;
}

location /resourceOss/ {
proxy_pass https://oss.timerbell.com;
}


     location /api/ {
                proxy_pass http://singapore_server;
      add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
  #      add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
   #     add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
        }

       location /views/ {
             proxy_pass http://singapore_server;
       }

        location / {
            root   html/web/;
            index  index.html index.htm;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

    }


}