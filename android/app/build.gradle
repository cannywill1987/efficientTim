android {
    useLibrary 'org.apache.http.legacy'
    compileSdk 34

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/libs']
        }
    }

    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    signingConfigs {
//        密码 linzhibin2003
        debug {
            keyAlias 'sign'
//            keyPassword '123456'
            keyPassword 'linzhibin2003'
            storeFile file('sign.jks')
//            storePassword '123456'
            storePassword 'linzhibin2003'
        }
        release {
            keyAlias 'sign'
//            keyPassword '123456'
            keyPassword 'linzhibin2003'
            storeFile file('sign.jks')
//            storePassword '123456'
            storePassword 'linzhibin2003'
        }
    }

    repositories {
        flatDir {
            dirs 'src/main/libs'
        }
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        //发布华为报名需要改成 com.timespeed.time_hello123
        applicationId "com.timespeed.time_hello"
        // You can update the following values to match your application needs. 
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-build-configuration.
        minSdkVersion 26
        targetSdkVersion 33
        multiDexEnabled true
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
//        manifestPlaceholders = [
//                JPUSH_PKGNAME: applicationId,
//                JPUSH_APPKEY : "1dd73715ccf3505ccefbba49",//值来自开发者平台取得的AppKey
//                JPUSH_CHANNEL: "default_developer",
//                MEIZU_APPKEY:"",
//                MEIZU_APPID:"",
//                XIAOMI_APPID:"",
//                XIAOMI_APPKEY:"",
//                OPPO_APPKEY:"",
//                OPPO_APPID:"",
//                OPPO_APPSECRET:"",
//                VIVO_APPKEY:"",
//                VIVO_APPID:""
//        ]
        ndk {
            //选择要添加的对应 cpu 类型的 .so 库。
//            abiFilters 'armeabi', 'armeabi-v7a', 'arm64-v8a'
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'armeabi'
            // 还可以添加 'x86', 'x86_64', 'mips', 'mips64'
        }

        manifestPlaceholders = [
                XG_ACCESS_ID : "1500031062",
                XG_ACCESS_KEY : "A3H8W45GF8GC",
        ]
    }

    packagingOptions {
        doNotStrip '*/mips/*.so'
        doNotStrip '*/mips64/*.so'
    }

    buildTypes {
        debug {
            // 开启混淆
            minifyEnabled false
            // 开启资源压缩，编译时会自动删除未使用到的res资源
            shrinkResources false
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
        }
        release {
            // 开启混淆
            minifyEnabled false
            // 开启资源压缩，编译时会自动删除未使用到的res资源
            shrinkResources false
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
        }
    }
    buildFeatures {
        viewBinding true
    }
    buildToolsVersion '32.0.0'
}

